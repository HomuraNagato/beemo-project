services:

  eve-embedding:
    container_name: eve-embedding
    hostname: eve-embedding
    image: vllm/vllm-openai-cpu:latest-x86_64
    privileged: true
    environment:
      VLLM_DEVICE: cpu
      EMBEDDING_DEVICE: cpu
      EMBEDDING_DTYPE: ${EMBEDDING_CPU_DTYPE:-bfloat16}
      EMBEDDING_CPU_KVCACHE_SPACE: ${EMBEDDING_CPU_KVCACHE_SPACE:-4}
    shm_size: 4g

  eve-vllm:
    container_name: eve-vllm
    hostname: eve-vllm
    image: vllm/vllm-openai-cpu:latest-x86_64
    privileged: true
    ports:
      - 5014:5014
    volumes:
      - ./models:/models
      - ./compose/reasoning_vllm/entrypoint.sh:/entrypoint.sh
    env_file:
      - ./.env
    environment:
      VLLM_DEVICE: cpu
      VLLM_DTYPE: ${VLLM_CPU_DTYPE:-bfloat16}
      VLLM_CPU_KVCACHE_SPACE: ${VLLM_CPU_KVCACHE_SPACE:-4}
    shm_size: 4g
    entrypoint: /entrypoint.sh
