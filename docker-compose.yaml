
services:

  eve-embedding:
    container_name: eve-embedding
    hostname: eve-embedding
    image: ${EMBEDDING_VLLM_IMAGE:-vllm/vllm-openai}
    privileged: true
    ports:
      - 5021:5021
    volumes:
      - ./models:/models
      - ./compose/embedding/entrypoint.sh:/entrypoint.sh
    env_file:
      - ./.env
    entrypoint: /entrypoint.sh

  eve-orchestrator:
    container_name: eve-orchestrator
    hostname: eve-orchestrator
#    image: eve-beemo-orchestrator
#    image: eve-orchestrator
    stdin_open: true
    tty: true
    privileged: true
    env_file:
      - ./.env
    ports:
      - 5013:5013
    build:
      context: ./compose/orchestrator
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace
      - eve-orchestrator-volume:/app/data


  eve-vision:
    container_name: eve-vision
    hostname: eve-vision
    image: eve-vision
    ports:
      - 5016:5016
    build:
      context: ./compose/vision
      dockerfile: Dockerfile
    env_file:
      - ./.env
    privileged: true

  eve-ui:
    container_name: eve-ui
    hostname: eve-ui
    image: eve-ui
    ports:
      - 5017:5017
    build:
      context: ./compose/ui
      dockerfile: Dockerfile
    env_file:
      - ./.env
    privileged: true

  eve-install:
    container_name: eve-install
    build:
      context: ./compose/install
      dockerfile: Dockerfile
    volumes:
      - ./:/workspace
      - eve-models-volume:/workspace/models
    entrypoint: /workspace/scripts/eve_install.sh

#  eve-tts:
#    container_name: eve-tts
#    hostname: eve-tts
#    image: eve-tts
#    ports:
#      - 5018:5018
#    build:
#      context: ./compose/tts
#      dockerfile: Dockerfile
#    env_file:
#      - ./.env
#    privileged: true
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: all
#              capabilities: [gpu]

  eve-asr:
    container_name: eve-asr
    hostname: eve-asr
#    image: eve-asr
    ports:
      - 5019:5019
    build:
      context: .
      dockerfile: compose/asr/Dockerfile
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./models:/models

  eve-wakeword:
    container_name: eve-wakeword
    hostname: eve-wakeword
#    image: eve-wakeword
    ports:
      - 5020:5020
    build:
      context: .
      dockerfile: compose/wakeword/Dockerfile
    env_file:
      - ./.env
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - eve-asr
      - eve-orchestrator
    volumes:
      - ./models:/models
      - type: bind
        source: ${PULSE_SOCKET_PATH:-/mnt/wslg/PulseServer}
        target: /tmp/pulse/native
        read_only: true

volumes:
  eve-orchestrator-volume:
    name: eve-orchestrator-volume
  eve-models-volume:
    name: eve-models-volume
